name: Update madvr-envy

on:
  schedule:
    - cron: "15 8 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-madvr-envy
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Update dependency version
        id: update
        run: |
          ./scripts/update_madvr_envy_version.sh
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          VERSION=$(python3 - <<'PY'
from pathlib import Path
import re
content = Path("custom_components/madvr_envy/manifest.json").read_text()
m = re.search(r"py-madvr-envy\.git@(v\d+\.\d+\.\d+)", content)
print(m.group(1) if m else "unknown")
PY
)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Run checks
        if: steps.update.outputs.changed == 'true'
        run: |
          uv run ruff check .
          uv run pytest -q

      - name: Create Pull Request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/update-madvr-envy-${{ steps.update.outputs.version }}
          delete-branch: true
          commit-message: "chore: bump madvr-envy to ${{ steps.update.outputs.version }}"
          title: "chore: bump madvr-envy to ${{ steps.update.outputs.version }}"
          body: |
            Automated dependency refresh from `binarylogic/py-madvr-envy` latest release.

            - Updated pinned git tag to `${{ steps.update.outputs.version }}`
            - Regenerated `uv.lock`
            - Ran lint and tests
          labels: dependencies
